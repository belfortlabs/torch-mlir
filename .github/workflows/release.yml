# yamllint disable rule:line-length
name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to build/publish (e.g. v2026.06.24). Leave empty for a dev build off main.'
        required: false
        default: ''
  pull_request:
    # Dry-run the release (build wheels, never publish) on any PR that carries
    # the "ci:wheels" label. `synchronize` re-runs the build on every push so
    # fixes are exercised without re-applying the label; `labeled` covers adding
    # the label to an existing PR.
    types: [labeled, synchronize]
  schedule:
    # Monthly dated release.
    - cron: '0 0 1 * *'

# Cancel superseded PR dry-runs, but never cancel a real release/publish run.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  setup-version:
    name: Setup version and publication status
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      contains(github.event.pull_request.labels.*.name, 'ci:wheels')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      should_publish: ${{ steps.get-version.outputs.should_publish }}
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Get version
        id: get-version
        shell: bash
        run: |
          python scripts/get_version.py \
            --event "${{ github.event_name }}" \
            --ref "${{ github.ref }}" \
            --tag "${{ github.event.release.tag_name || inputs.tag_name || '' }}" \
            --package "belfort-torch-mlir" \
            --gha

  build_wheels:
    name: Build wheels on ${{ matrix.name }}
    needs: [setup-version]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      contains(github.event.pull_request.labels.*.name, 'ci:wheels')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-24.04
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
          - name: macos-arm64
            runner: macos-15

    steps:
      - name: Check out torch-mlir
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # The externals/llvm-project submodule must be present: cibuildwheel
          # copies this checkout into the manylinux container to build from.
          # Shallow (default depth 1) on purpose — the build only needs the
          # source tree at the pinned commit, not LLVM's full git history.
          submodules: 'recursive'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        name: Install Python 3.12
        with:
          python-version: "3.12"
      - run: pip install --upgrade pip uv

      - name: Compute LLVM submodule SHA (for ccache key)
        id: llvm
        shell: bash
        run: echo "sha=$(git rev-parse HEAD:externals/llvm-project)" >> "$GITHUB_OUTPUT"

      - name: Restore ccache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          # On Linux this dir is bind-mounted into the manylinux container as
          # /project/.ccache (see [tool.cibuildwheel.linux] CCACHE_DIR). On macOS
          # the build runs natively and reads CCACHE_DIR from the step env below.
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ matrix.name }}-${{ steps.llvm.outputs.sha }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.name }}-${{ steps.llvm.outputs.sha }}-
            ccache-${{ matrix.name }}-

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55 # v4.1.0
        env:
          # Injected into setup.py via the env var it already reads.
          TORCH_MLIR_PYTHON_PACKAGE_VERSION: ${{ needs.setup-version.outputs.version }}
          # macOS builds run natively and inherit this; Linux uses the in-container
          # CCACHE_DIR from pyproject.toml instead.
          CCACHE_DIR: ${{ github.workspace }}/.ccache

      - name: Upload ${{ matrix.name }} wheels
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.name }}
          path: wheelhouse/*.whl

  perform_release:
    name: Create GitHub Release and Upload Assets
    needs: [setup-version, build_wheels]
    if: needs.setup-version.outputs.should_publish == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Extract and rename torch-mlir-opt binaries
        shell: bash
        run: |
          mkdir -p extracted
          for whl in dist/*.whl; do
            filename=$(basename "$whl")
            # Platform tag is the last '-'-separated field of the wheel name,
            # minus the .whl extension.
            platform=$(echo "$filename" | rev | cut -d- -f1 | rev | cut -d. -f1)
            echo "Processing $whl for platform $platform"
            # -j strips the archive path so the binary lands directly in tmp.
            unzip -j "$whl" "torch_mlir/_mlir_libs/torch-mlir-opt" -d tmp_extract || true
            if [ -f tmp_extract/torch-mlir-opt ]; then
              mv tmp_extract/torch-mlir-opt "extracted/torch-mlir-opt-$platform"
            fi
            rm -rf tmp_extract
          done
          echo "Extracted files:"
          ls -alh extracted/ || true

      - name: Determine tag name
        id: tag
        shell: bash
        run: |
          TAG_NAME="${{ needs.setup-version.outputs.version }}"
          if [[ ! "$TAG_NAME" =~ ^v ]]; then
            TAG_NAME="v$TAG_NAME"
          fi
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Create Release
        id: release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          generate_release_notes: true
          files: |
            dist/*.whl
            extracted/*

  pypi_upload:
    name: Publish wheels to PyPI
    needs: [setup-version, build_wheels]
    if: needs.setup-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1.13
        with:
          verbose: true
